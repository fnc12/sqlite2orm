name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
        build_type: [Release, Debug]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DSQLITE2ORM_BUILD_TESTS=ON
          -DSQLITE2ORM_BUILD_CLI=ON
          -DSQLITE2ORM_BUILD_EXAMPLES=ON

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Run unit tests
        working-directory: build
        run: ctest --output-on-failure -C ${{ matrix.build_type }} -R "sqlite2orm_tests|sqlite2orm_cli"

      - name: Run examples
        working-directory: build
        run: ctest --output-on-failure -C ${{ matrix.build_type }} -R "example_"
